<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Graph Intelligence Platform</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#2563eb;
      --line:#e2e8f0;
      --danger:#ef4444;
      --success:#16a34a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      display: flex;
      height: 100dvh;
      overflow: hidden;
      gap: 12px;
      padding: 12px;
    }

    .graph-panel, .chat-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      min-height: 0;
    }

    .graph-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-panel {
      width: 420px;
      display: flex;
      flex-direction: column;
    }

    .graph-header, .chat-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      border-radius: 12px 12px 0 0;
    }

    .graph-header h2, .chat-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .graph-header p {
      font-size: 12px;
      color: var(--muted);
    }

    .node-controls {
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .node-controls input, .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .node-controls input:focus, .chat-input input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .node-controls button, .chat-input button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      transition: .15s ease;
    }

    .node-controls button:hover, .chat-input button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(0.97);
    }

    .chat-input button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    #graph {
      flex: 1;
      min-height: 320px;
      border-bottom: 1px solid var(--line);
    }

    .metadata {
      padding: 12px;
      max-height: 170px;
      overflow: auto;
      font-size: 12px;
      background: #f8fafc;
    }

    .metadata h4 {
      font-size: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .metadata pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #fff;
      border: 1px solid var(--line);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 8px;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.4;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 14px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 96%;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-radius: 12px 4px 12px 12px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
    }

    .message.error {
      align-self: flex-start;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
    }

    .message.info {
      align-self: center;
      font-size: 12px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
    }

    .answer-text {
      background: #f8fafc;
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
    }

    .meta-line {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    details.result-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 8px;
      background: #fff;
    }

    details.result-details summary {
      cursor: pointer;
      padding: 8px 10px;
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    .query-text {
      margin: 0 10px 10px;
      background: #f8fafc;
      border-left: 3px solid #94a3b8;
      border-radius: 6px;
      padding: 8px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      overflow: auto;
      white-space: pre;
    }

    .table-results {
      max-height: 280px;
      overflow: auto;
      padding: 0 8px 8px;
    }

    .table-results table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .table-results th, .table-results td {
      border-bottom: 1px solid #e2e8f0;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    .table-results th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0f172a;
      color: #fff;
    }

    .table-results tr:nth-child(even) td {
      background: #f8fafc;
    }

    .chat-input {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: flex;
      gap: 8px;
      background: #fff;
      border-radius: 0 0 12px 12px;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="graph-panel">
      <div class="graph-header">
        <h2>Graph Explorer</h2>
        <p>Explore relationships • Double-click node to expand • Click node for metadata</p>
      </div>
      <div class="node-controls">
        <input id="nodeId" type="text" placeholder="Enter node ID (e.g., 740506)" />
        <button onclick="expandRoot()">Explore</button>
      </div>
      <div id="graph"></div>
      <div class="metadata">
        <h4>Node Metadata</h4>
        <pre id="meta">Select a node to view details...</pre>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <h2>Query Assistant</h2>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="Ask dataset questions..." />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);

    const network = new vis.Network(
      document.getElementById("graph"),
      { nodes, edges },
      {
        physics: { stabilization: { iterations: 120 } },
        interaction: { navigationButtons: true, keyboard: true, hover: true }
      }
    );

    function pick(obj, keys, fallback = null) {
      for (const k of keys) {
        if (obj && obj[k] !== undefined && obj[k] !== null) return obj[k];
      }
      return fallback;
    }

    function getNodeId(n) {
      return String(pick(n, ["id", "node_id", "document_id", "billing_document_id", "sales_document_id"], ""));
    }

    function getNodeType(n) {
      return String(pick(n, ["type", "node_type", "entity_type"], "Entity"));
    }

    function normalizeNeighborsPayload(data) {
      const center = pick(data, ["node", "center", "source_node"], {});
      const neighbors = pick(data, ["neighbors", "adjacent_nodes", "connected_nodes"], []);
      const rels = pick(data, ["edges", "relationships", "links"], []);
      return {
        centerNode: center,
        neighbors: Array.isArray(neighbors) ? neighbors : [],
        edges: Array.isArray(rels) ? rels : []
      };
    }

    async function expandNode(id) {
      const r = await fetch(`${BASE}/graph/neighbors/${encodeURIComponent(id)}`);
      if (!r.ok) throw new Error(`Node not found: ${id}`);

      const raw = await r.json();
      const data = normalizeNeighborsPayload(raw);

      const cId = getNodeId(data.centerNode);
      if (cId) {
        nodes.update([{
          id: cId,
          label: `${getNodeType(data.centerNode)}\n${cId}`,
          title: JSON.stringify(data.centerNode, null, 2)
        }]);
      }

      for (const n of data.neighbors) {
        const nId = getNodeId(n);
        if (!nId) continue;
        nodes.update([{
          id: nId,
          label: `${getNodeType(n)}\n${nId}`,
          title: JSON.stringify(n, null, 2)
        }]);
      }

      for (const e of data.edges) {
        const from = String(pick(e, ["source", "from", "source_id"], ""));
        const to = String(pick(e, ["target", "to", "target_id"], ""));
        const rel = String(pick(e, ["relationship", "label", "type"], "REL"));
        if (!from || !to) continue;

        edges.update([{
          id: `${from}-${to}-${rel}`,
          from,
          to,
          label: rel,
          arrows: "to"
        }]);
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function safeText(v) {
      if (v === null || v === undefined) return "";
      if (typeof v === "object") return JSON.stringify(v, null, 2);
      return String(v);
    }

    function formatValue(v) {
      if (v === null || v === undefined) return "";
      if (typeof v === "number") {
        return Math.abs(v) >= 1000
          ? new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 }).format(v)
          : String(v);
      }
      if (typeof v === "object") return JSON.stringify(v);
      return String(v);
    }

    function addMessage(text, role = "assistant") {
      const messagesDiv = document.getElementById("chatMessages");
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      msg.innerHTML = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return msg;
    }

    function chatAddAssistant(text, meta = "") {
      addMessage(
        `<div class="answer-text">${escapeHtml(text).replace(/\n/g, "<br/>")}</div>
         ${meta ? `<div class="meta-line">${escapeHtml(meta)}</div>` : ""}`,
        "assistant"
      );
    }

    function chatAddCode(sql) {
      if (!sql) return;
      addMessage(
        `<details class="result-details">
           <summary>Show generated SQL</summary>
           <div class="query-text">${escapeHtml(sql)}</div>
         </details>`,
        "assistant"
      );
    }

    function chatAddTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) return;

      const cols = Object.keys(rows[0] || {});
      let html = `<details class="result-details"><summary>Show result table (${rows.length} rows)</summary>`;
      html += `<div class="table-results"><table><tr><th>#</th>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;

      for (const [idx, row] of rows.slice(0, 20).entries()) {
        html += `<tr><td>${idx + 1}</td>${cols.map(c => `<td>${escapeHtml(formatValue(row[c]))}</td>`).join("")}</tr>`;
      }

      html += `</table></div></details>`;
      addMessage(html, "assistant");
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const sendBtn = document.getElementById("sendBtn");
      const question = input.value.trim();
      if (!question) return;

      addMessage(escapeHtml(question), "user");
      input.value = "";
      sendBtn.disabled = true;
      const loading = addMessage("⏳ Processing...", "info");

      try {
        const r = await fetch(`${BASE}/chat/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await r.json().catch(() => ({}));
        loading.remove();

        if (!r.ok) {
          const detail = data?.detail;
          const msg = typeof detail === "string" ? detail : safeText(detail?.message || detail || "Query failed");
          const mode = safeText(detail?.mode || "unknown");
          const sql = safeText(detail?.generated_sql || "");
          chatAddAssistant(`⚠️ ${msg}`, `Mode: ${mode}`);
          if (sql) chatAddCode(sql);
          return;
        }

        const answer = safeText(data.answer_text || "Done.");
        const mode = safeText(data.mode || "unknown");
        const rows = Array.isArray(data.rows) ? data.rows : [];
        const sql = safeText(data.generated_sql || "");

        chatAddAssistant(answer, `Mode: ${mode} • Rows: ${rows.length}`);
        chatAddCode(sql);
        chatAddTable(rows);
      } catch (err) {
        loading.remove();
        addMessage(`❌ ${escapeHtml(safeText(err?.message || "Unexpected error"))}`, "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    function expandRoot() {
      const id = document.getElementById("nodeId").value.trim();
      if (!id) return addMessage("Enter a node ID first.", "error");
      expandNode(id).catch(e => addMessage(escapeHtml(e.message), "error"));
    }

    network.on("doubleClick", (params) => {
      if (!params.nodes.length) return;
      expandNode(params.nodes[0]).catch(e => addMessage(escapeHtml(e.message), "error"));
    });

    network.on("click", async (params) => {
      if (!params.nodes.length) return;
      const id = params.nodes[0];
      const meta = document.getElementById("meta");
      try {
        const r = await fetch(`${BASE}/graph/node/${encodeURIComponent(id)}`);
        const d = await r.json();
        meta.textContent = JSON.stringify(d.node || d, null, 2);
      } catch {
        meta.textContent = "Failed to load node metadata.";
      }
    });

    document.getElementById("chatInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    addMessage("Ask an ERP question to get a data-backed answer.", "info");
  </script>
</body>
</html>
