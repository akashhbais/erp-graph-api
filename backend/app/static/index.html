<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Graph Intelligence Platform</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .container { display: flex; height: 100vh; }
    
    .graph-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      background: white;
    }
    
    .chat-panel {
      width: 350px;
      display: flex;
      flex-direction: column;
      background: white;
      border-left: 1px solid #ddd;
    }
    
    .header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      background: #f9f9f9;
    }
    
    .header h3 { font-size: 18px; color: #333; }
    
    #graph {
      flex: 1;
      border: 1px solid #ddd;
    }
    
    .node-controls {
      padding: 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #ddd;
    }
    
    .node-controls input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .node-controls button {
      padding: 8px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .node-controls button:hover { background: #0056b3; }
    
    .metadata {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      background: #f9f9f9;
    }
    
    .metadata pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: monospace;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      padding: 10px 12px;
      border-radius: 8px;
      max-width: 90%;
      word-wrap: break-word;
      font-size: 13px;
      line-height: 1.4;
    }
    
    .message.user {
      align-self: flex-end;
      background: #007bff;
      color: white;
    }
    
    .message.assistant {
      align-self: flex-start;
      background: #e9ecef;
      color: #333;
    }
    
    .message.error {
      align-self: flex-start;
      background: #f8d7da;
      color: #721c24;
    }
    
    .chat-input {
      padding: 12px;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
    }
    
    .chat-input input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
    
    .chat-input button {
      padding: 8px 16px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    
    .chat-input button:hover { background: #218838; }
    
    .chat-input button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .loading { text-align: center; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Graph Panel -->
    <div class="graph-panel">
      <div class="header">
        <h3>📊 ERP Graph Explorer</h3>
      </div>
      <div class="node-controls">
        <input id="nodeId" type="text" placeholder="Enter node id (e.g., 740506)" />
        <button onclick="expandRoot()">Expand</button>
      </div>
      <div id="graph"></div>
      <div class="metadata">
        <strong>Node Metadata:</strong>
        <pre id="meta">Click a node to inspect.</pre>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="header">
        <h3>💬 Query Assistant</h3>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="Ask about the data..." />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);
    const network = new vis.Network(
      document.getElementById("graph"),
      { nodes, edges },
      {
        physics: { stabilization: { iterations: 200 } },
        nodes: { shape: "box", color: { background: "#3498db", border: "#2c3e50", highlight: { background: "#e74c3c" } } },
        edges: { color: "#95a5a6", arrows: { to: { enabled: true } } }
      }
    );

    // Graph Operations
    async function expandNode(id) {
      try {
        const r = await fetch(`${BASE}/graph/neighbors/${encodeURIComponent(id)}`);
        if (!r.ok) throw new Error(`Node not found: ${id}`);
        const data = await r.json();

        nodes.update([{ id: data.node.id, label: `${data.node.type}\n${data.node.id}`, title: JSON.stringify(data.node) }]);

        for (const n of (data.neighbors || [])) {
          nodes.update([{ id: n.id, label: `${n.type}\n${n.id}`, title: JSON.stringify(n) }]);
        }

        for (const e of (data.edges || [])) {
          edges.update([{
            id: `${e.source}-${e.target}-${e.relationship}`,
            from: e.source,
            to: e.target,
            label: e.relationship
          }]);
        }
      } catch (err) {
        alert(err.message);
      }
    }

    function expandRoot() {
      const id = document.getElementById("nodeId").value.trim();
      if (id) expandNode(id);
    }

    network.on("doubleClick", async (params) => {
      if (params.nodes.length) await expandNode(params.nodes[0]);
    });

    network.on("click", async (params) => {
      if (!params.nodes.length) return;
      const id = params.nodes[0];
      const r = await fetch(`${BASE}/graph/node/${encodeURIComponent(id)}`);
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById("meta").textContent = JSON.stringify(d.node, null, 2);
    });

    // Chat Operations
    const messagesDiv = document.getElementById("chatMessages");
    const input = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, role) {
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      msg.textContent = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      sendBtn.disabled = true;

      try {
        const r = await fetch(`${BASE}/chat/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        if (!r.ok) {
          const err = await r.json();
          addMessage(`Error: ${err.detail}`, "error");
        } else {
          const data = await r.json();
          let response = `Query: ${data.generated_sql}\n\nResults:\n`;
          if (data.rows && data.rows.length > 0) {
            response += data.rows.map(r => JSON.stringify(r)).join("\n");
          } else {
            response += "No results found.";
          }
          addMessage(response, "assistant");
        }
      } catch (err) {
        addMessage(`Error: ${err.message}`, "error");
      } finally {
        sendBtn.disabled = false;
      }
    }

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Load stats on init
    (async () => {
      try {
        const r = await fetch(`${BASE}/graph/stats`);
        const data = await r.json();
        addMessage(`📊 System initialized. Database has ${JSON.stringify(data.statistics).length} entities.`, "assistant");
      } catch (err) {
        addMessage(`Failed to load stats: ${err.message}`, "error");
      }
    })();
  </script>
</body>
</html>
