services:
  - type: web
    name: erp-graph-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash backend/deploy/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "false"
      - key: APP_DB_PATH
        value: /tmp/app.duckdb