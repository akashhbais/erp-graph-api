services:
  - type: web
    name: erp-graph-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash backend/deploy/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "false"
      - key: APP_DB_PATH
        value: /var/data/app.duckdb
    disk:
      name: erp_data
      mountPath: /var/data
      sizeGB: 1